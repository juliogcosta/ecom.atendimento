spring:
  application:
    name: assistencia-atendimento-service

  cloud:
    config:
      enabled: false

  task:
    execution:
      pool:
        core-size: 2
        max-size: 4
        queue-capacity: 100
        keep-alive: 60
        allow-core-thread-timeout: true
        thread-name-prefix: event-async-
        await-termination-seconds: 30

  datasource:
    url: jdbc:postgresql://localhost:5432/ecom_db
    username: admin_ecom_db
    password: admin_ecom_db
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    schemas: ecom_ae

  rabbitmq:
    host: localhost
    port: 5676
    username: guest
    password: guest
    # Configurações de integração com Financeiro
    financeiro:
      exchange: financeiro.exchange
      queue: atendimento.finalizado.queue
      routing-key: atendimento.finalizado
    # Configurações de integração com Projection (Read Model)
    projection:
      exchange: atendimento.events.exchange
      queue: atendimento.projection.queue
      routing-key: atendimento.event

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    root: INFO
    com.ecom: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Configurações específicas do Event Sourcing
cqrs:
  aggregate:
    snapshot:
      enabled: true
      frequency: 100  # Criar snapshot a cada 100 eventos

# Schema do banco de dados para Event Store
db:
  schema: ecom_ae

# Configurações de tratamento de exceções
exception:
  handle:
    stackTrace: false

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8799/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
